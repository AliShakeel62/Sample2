document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Work Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"dd2b3253-8b5b-40e3-9625-87f384a99cfe\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================\n   Aldgate Risk Advisory — global stylesheet\n   Banking-grade, restrained, structured.\n   ============================================ */\n\n:root {\n  --white: #FFFFFF;\n  --off-white: #FAFEEB;        /* pale cream — alternating sections */\n  --paper: #FCFDF4;\n  --mint: #A6D4C5;              /* soft mint — accent backgrounds */\n  --navy: #3E8C7A;              /* deep teal — primary brand */\n  --navy-deep: #2F7164;\n  --navy-700: #5BA697;\n  --blue: #3E8C7A;              /* link colour kept on-palette */\n  --blue-hover: #2F7164;\n  --sage: #B5DAA8;              /* sage green */\n  --sage-deep: #88BD8C;\n  --green: #B5DAA8;             /* legacy alias */\n  --green-deep: #6FA374;\n  --text: #1F3A33;\n  --text-muted: #4A6660;\n  --text-faint: #7A8E89;\n  --border: #E2EEDE;\n  --border-strong: #C9DDC4;\n  --shadow-sm: 0 1px 2px rgba(62, 140, 122, 0.05);\n  --shadow-md: 0 4px 14px rgba(62, 140, 122, 0.08);\n  --shadow-lg: 0 12px 32px rgba(62, 140, 122, 0.12);\n  --radius: 6px;\n  --radius-card: 8px;\n  --max: 1240px;\n  --gutter: clamp(20px, 4vw, 40px);\n}\n\n* { box-sizing: border-box; }\nhtml { scroll-behavior: smooth; }\nbody {\n  margin: 0;\n  font-family: \"Work Sans\", system-ui, -apple-system, \"Segoe UI\", sans-serif;\n  font-size: 16px;\n  line-height: 1.65;\n  color: var(--text);\n  background: var(--white);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  font-family: \"Work Sans\", system-ui, sans-serif;\n  color: var(--navy);\n  font-weight: 700;\n  letter-spacing: -0.015em;\n  line-height: 1.2;\n  margin: 0 0 0.5em;\n  text-wrap: balance;\n}\nh1 { font-size: clamp(32px, 4.4vw, 52px); font-weight: 700; }\nh2 { font-size: clamp(28px, 3.2vw, 36px); font-weight: 700; }\nh3 { font-size: 22px; font-weight: 600; }\nh4 { font-size: 18px; font-weight: 600; letter-spacing: -0.005em; }\n\np { margin: 0 0 1em; text-wrap: pretty; }\n.lede { font-size: 18px; line-height: 1.6; color: var(--text-muted); }\n\na { color: var(--blue); text-decoration: none; transition: color 0.15s ease; }\na:hover { color: var(--blue-hover); text-decoration: underline; text-underline-offset: 3px; }\n\n.green-accent { color: var(--green-deep); font-weight: 700; }\n\n/* ----- container ----- */\n.container { max-width: var(--max); margin: 0 auto; padding: 0 var(--gutter); }\n.container-narrow { max-width: 880px; margin: 0 auto; padding: 0 var(--gutter); }\n\n/* ----- buttons ----- */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  padding: 12px 22px;\n  border-radius: var(--radius);\n  font-weight: 600;\n  font-size: 15px;\n  font-family: \"Work Sans\", sans-serif;\n  border: 1px solid transparent;\n  cursor: pointer;\n  text-decoration: none;\n  transition: all 0.15s ease;\n  white-space: nowrap;\n}\n.btn-primary { background: var(--navy); color: white; }\n.btn-primary:hover { background: var(--navy-deep); color: white; text-decoration: none; }\n.btn-accent { background: var(--sage-deep); color: var(--navy); }\n.btn-accent:hover { background: var(--green-deep); color: white; }\n.btn-outline { background: transparent; color: var(--navy); border-color: var(--border-strong); }\n.btn-outline:hover { background: var(--navy); color: white; text-decoration: none; border-color: var(--navy); }\n.btn-link { background: transparent; color: var(--blue); padding: 0; font-weight: 500; }\n.btn-link:hover { color: var(--blue-hover); }\n.btn-link::after { content: \"→\"; transition: transform 0.15s ease; }\n.btn-link:hover::after { transform: translateX(3px); }\n\n/* ----- topbar (slim utility bar) ----- */\n.topbar {\n  background: var(--navy-deep);\n  color: rgba(255,255,255,0.78);\n  font-size: 13px;\n  padding: 8px 0;\n}\n.topbar .container { display: flex; justify-content: space-between; align-items: center; gap: 24px; }\n.topbar a { color: rgba(255,255,255,0.86); }\n.topbar a:hover { color: white; }\n.topbar-right { display: flex; gap: 20px; align-items: center; }\n.topbar-tag { display: inline-flex; align-items: center; gap: 6px; }\n.topbar-tag::before { content: \"\"; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); }\n\n/* ----- navbar ----- */\n.nav {\n  background: white;\n  border-bottom: 1px solid var(--border);\n  position: sticky;\n  top: 0;\n  z-index: 100;\n  transition: padding 0.2s ease, box-shadow 0.2s ease;\n}\n.nav.scrolled { box-shadow: var(--shadow-sm); }\n.nav-inner {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  height: 76px;\n  gap: 32px;\n}\n.nav.scrolled .nav-inner { height: 64px; }\n.brand {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  text-decoration: none;\n  color: var(--navy);\n  flex-shrink: 0;\n}\n.brand:hover { text-decoration: none; color: var(--navy); }\n.brand-mark {\n  width: 36px; height: 36px;\n  background: var(--navy);\n  color: white;\n  display: grid; place-items: center;\n  font-family: \"Work Sans\", sans-serif;\n  font-weight: 700;\n  font-size: 18px;\n  border-radius: 4px;\n  position: relative;\n}\n.brand-mark::after {\n  content: \"\";\n  position: absolute;\n  bottom: 4px; right: 4px;\n  width: 6px; height: 6px;\n  background: var(--green);\n}\n.brand-name {\n  font-family: \"Work Sans\", sans-serif;\n  font-size: 18px;\n  font-weight: 700;\n  letter-spacing: -0.01em;\n  line-height: 1.1;\n  color: var(--navy);\n}\n.brand-name small {\n  display: block;\n  font-family: \"Work Sans\", sans-serif;\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--text-faint);\n  margin-top: 2px;\n}\n\n.nav-links {\n  display: flex;\n  gap: 4px;\n  list-style: none;\n  margin: 0;\n  padding: 0;\n  align-items: center;\n}\n.nav-links > li { position: static; }\n.nav-link {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  padding: 10px 14px;\n  font-size: 14.5px;\n  font-weight: 500;\n  color: var(--text);\n  border-radius: 4px;\n  cursor: pointer;\n  position: relative;\n}\n.nav-link:hover { color: var(--navy); text-decoration: none; background: var(--off-white); }\n.nav-link.active { color: var(--navy); }\n.nav-link.active::after {\n  content: \"\";\n  position: absolute;\n  left: 14px; right: 14px; bottom: 4px;\n  height: 2px; background: var(--green);\n}\n.nav-caret { font-size: 10px; opacity: 0.6; transition: transform 0.2s; }\n.has-mega:hover .nav-caret, .has-mega.open .nav-caret { transform: rotate(180deg); }\n\n.nav-cta { margin-left: 8px; }\n\n/* ----- mega dropdown ----- */\n.mega {\n  position: absolute;\n  left: 0; right: 0;\n  top: 100%;\n  background: white;\n  border-top: 1px solid var(--border);\n  border-bottom: 3px solid var(--navy);\n  box-shadow: var(--shadow-lg);\n  opacity: 0;\n  visibility: hidden;\n  transform: translateY(-6px);\n  transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;\n  z-index: 99;\n}\n.has-mega:hover .mega, .has-mega.open .mega, .mega:hover { opacity: 1; visibility: visible; transform: translateY(0); }\n.mega-inner { display: grid; grid-template-columns: 240px 1fr; gap: 40px; padding: 36px var(--gutter); max-width: var(--max); margin: 0 auto; }\n.mega-intro h3 {\n  font-size: 22px;\n  font-weight: 700;\n  margin-bottom: 12px;\n  color: var(--navy);\n}\n.mega-intro p { font-size: 14px; color: var(--text-muted); line-height: 1.55; margin-bottom: 16px; }\n.mega-intro .btn-link { font-size: 14px; }\n\n.mega-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; }\n.mega-col h4 {\n  font-size: 11px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--text-faint);\n  font-weight: 600;\n  margin-bottom: 4px;\n  padding-bottom: 10px;\n  border-bottom: 1px solid var(--border);\n}\n.mega-col h4 a { color: var(--navy); display: block; font-size: 16px; letter-spacing: -0.01em; text-transform: none; margin-top: 6px; font-weight: 700; }\n.mega-col h4 a:hover { color: var(--blue); text-decoration: none; }\n.mega-col ul { list-style: none; padding: 0; margin: 14px 0 0; }\n.mega-col li { margin: 0; }\n.mega-col li a {\n  display: block;\n  padding: 7px 0;\n  color: var(--text-muted);\n  font-size: 14px;\n  border-bottom: 1px dashed transparent;\n}\n.mega-col li a:hover { color: var(--navy); text-decoration: none; padding-left: 4px; }\n\n/* ----- hero ----- */\n.hero {\n  position: relative;\n  background: var(--off-white);\n  padding: 96px 0 88px;\n  overflow: hidden;\n  border-bottom: 1px solid var(--border);\n}\n.hero-bg {\n  position: absolute; inset: 0;\n  background-image: linear-gradient(rgba(250,254,235,0.78), rgba(250,254,235,0.65)), url(\"ab861713-7b60-4dca-8e9d-96c945aaf9f9\");\n  background-size: cover;\n  background-position: center;\n  z-index: 0;\n}\n.hero-inner { position: relative; z-index: 1; max-width: 880px; }\n.hero h1 { margin-bottom: 24px; }\n.hero .lede { font-size: 19px; max-width: 720px; }\n.hero-actions { display: flex; gap: 12px; margin-top: 32px; flex-wrap: wrap; }\n\n.eyebrow {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  font-size: 12px;\n  font-weight: 600;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--blue);\n  margin-bottom: 18px;\n}\n.eyebrow::before { content: \"\"; display: inline-block; width: 24px; height: 1px; background: var(--blue); }\n\n/* ----- section ----- */\nsection { padding: 80px 0; }\nsection.tight { padding: 56px 0; }\n.section-alt { background: var(--off-white); }\n.section-mint { background: var(--mint); }\n.section-dark { background: var(--navy); color: rgba(255,255,255,0.86); }\n.section-dark h1, .section-dark h2, .section-dark h3 { color: white; }\n\n.section-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 40px; margin-bottom: 40px; flex-wrap: wrap; }\n.section-head h2 { margin: 0; max-width: 640px; }\n.section-head p { color: var(--text-muted); max-width: 480px; margin: 0; }\n\n/* ----- trust strip ----- */\n.trust {\n  background: white;\n  border-top: 1px solid var(--border);\n  border-bottom: 1px solid var(--border);\n  padding: 28px 0;\n}\n.trust-row {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: 56px;\n  flex-wrap: wrap;\n  font-size: 13px;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--text-faint);\n  font-weight: 500;\n}\n.trust-item { display: inline-flex; align-items: center; gap: 10px; }\n.trust-badge {\n  display: inline-grid;\n  place-items: center;\n  width: 30px; height: 30px;\n  border: 1px solid var(--border-strong);\n  border-radius: 50%;\n  font-weight: 700;\n  font-size: 11px;\n  color: var(--navy);\n  background: var(--off-white);\n}\n\n/* ----- card grid ----- */\n.grid { display: grid; gap: 24px; }\n.grid-2 { grid-template-columns: repeat(2, 1fr); }\n.grid-3 { grid-template-columns: repeat(3, 1fr); }\n.grid-4 { grid-template-columns: repeat(4, 1fr); }\n@media (max-width: 980px) {\n  .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); }\n}\n@media (max-width: 640px) {\n  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }\n}\n\n.card {\n  background: white;\n  border: 1px solid var(--border);\n  border-radius: var(--radius-card);\n  padding: 28px;\n  transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;\n  display: flex; flex-direction: column;\n  position: relative;\n}\n.card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-md); transform:  }\n\n/* ----- breadcrumb ----- */\n.crumb {\n  font-size: 13px;\n  color: var(--text-faint);\n  padding: 18px 0;\n  border-bottom: 1px solid var(--border);\n  background: white;\n}\n.crumb a { color: var(--text-muted); }\n.crumb a:hover { color: var(--navy); }\n.crumb .sep { margin: 0 8px; opacity: 0.5; }\n.crumb .here { color: var(--navy); font-weight: 500; }\n\n/* ----- page hero (smaller than homepage hero) ----- */\n.page-hero {\n  background: var(--off-white);\n  padding: 64px 0 48px;\n  border-bottom: 1px solid var(--border);\n}\n.page-hero h1 { font-size: clamp(32px, 4vw, 44px); margin-bottom: 14px; }\n.page-hero .lede { font-size: 18px; max-width: 680px; }\n.page-hero .eyebrow { color: var(--text-faint); }\n.page-hero .eyebrow::before { background: var(--text-faint); }\n\n/* ----- two-col layout (sidebar + content) ----- */\n.layout {\n  display: grid;\n  grid-template-columns: 260px 1fr;\n  gap: 56px;\n  padding: 56px 0 96px;\n}\n@media (max-width: 900px) { .layout { grid-template-columns: 1fr; gap: 32px; } }\n\n.side-nav { position: sticky; top: 100px; align-self: start; }\n.side-nav h4 {\n  font-size: 11px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--text-faint);\n  margin: 0 0 12px;\n  padding-bottom: 12px;\n  border-bottom: 1px solid var(--border);\n}\n.side-nav ul { list-style: none; padding: 0; margin: 0; }\n.side-nav li a {\n  display: block;\n  padding: 10px 0 10px 14px;\n  color: var(--text-muted);\n  font-size: 14.5px;\n  border-left: 2px solid transparent;\n  margin-left: -14px;\n  padding-left: 14px;\n}\n.side-nav li a:hover { color: var(--navy); text-decoration: none; }\n.side-nav li.active a { color: var(--navy); border-left-color: var(--navy); font-weight: 500; }\n\n/* ----- prose (article body) ----- */\n.prose h2 { margin-top: 40px; font-size: 28px; }\n.prose h3 { margin-top: 32px; font-size: 20px; }\n.prose ul { padding-left: 20px; }\n.prose ul li { padding: 4px 0; color: var(--text-muted); }\n.prose li::marker { color: var(--text-faint); }\n.prose .pull {\n  border-left: 3px solid var(--green);\n  padding: 4px 20px;\n  margin: 24px 0;\n  font-size: 20px;\n  font-weight: 500;\n  color: var(--navy);\n  line-height: 1.5;\n}\n\n/* ----- numbered approach steps ----- */\n.steps { list-style: none; padding: 0; margin: 24px 0; counter-reset: step; }\n.steps li {\n  counter-increment: step;\n  position: relative;\n  padding: 18px 18px 18px 76px;\n  border: 1px solid var(--border);\n  border-radius: var(--radius-card);\n  margin-bottom: 12px;\n  background: var(--paper);\n}\n.steps li::before {\n  content: counter(step, decimal-leading-zero);\n  position: absolute;\n  left: 22px; top: 18px;\n  font-size: 22px;\n  color: var(--green-deep);\n  font-weight: 700;\n}\n.steps li strong { display: block; color: var(--navy); margin-bottom: 4px; font-size: 16px; font-weight: 600; }\n.steps li span { font-size: 14.5px; color: var(--text-muted); }\n\n/* ----- insight cards ----- */\n.insight-card {\n  background: white;\n  border: 1px solid var(--border);\n  border-radius: var(--radius-card);\n  overflow: hidden;\n  display: flex; flex-direction: column;\n  transition: all 0.18s;\n}\n.insight-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-md); transform: translateY(-2px); }\n.insight-cover {\n  aspect-ratio: 16/9;\n  background-size: cover; background-position: center;\n  background-color: var(--navy);\n  position: relative;\n  border-bottom: 1px solid var(--border);\n}\n.insight-cover::after {\n  content: \"\";\n  position: absolute; inset: 0;\n  background: linear-gradient(180deg, rgba(30,58,95,0.0) 0%, rgba(30,58,95,0.18) 100%);\n}\n.insight-body { padding: 22px 24px 24px; display: flex; flex-direction: column; flex: 1; }\n.insight-meta { display: flex; gap: 8px; align-items: center; font-size: 12px; color: var(--text-faint); margin-bottom: 12px; flex-wrap: wrap; }\n.insight-meta time { letter-spacing: 0.04em; }\n.insight-tag {\n  display: inline-block;\n  padding: 2px 8px;\n  background: var(--off-white);\n  color: var(--blue);\n  border: 1px solid var(--border);\n  border-radius: 3px;\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n}\n.insight-body h3 { font-size: 19px; margin-bottom: 10px; line-height: 1.3; }\n.insight-body p { color: var(--text-muted); font-size: 14.5px; flex: 1; margin-bottom: 14px; }\n\n/* ----- product/feature module ----- */\n.module-section {\n  background: var(--navy);\n  color: rgba(255,255,255,0.88);\n  position: relative;\n  overflow: hidden;\n}\n.module-section::before {\n  content: \"\";\n  position: absolute; inset: 0;\n  background-image: url(\"1e255618-a9a1-4053-ab81-5fdd64efd4be\");\n  background-size: 800px;\n  background-repeat: repeat;\n  opacity: 0.12;\n  pointer-events: none;\n}\n.module-section h2 { color: white; }\n.module-section .lede { color: rgba(255,255,255,0.7); }\n.module-section .container { position: relative; z-index: 1; }\n.modules { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-top: 40px; }\n@media (max-width: 1100px) { .modules { grid-template-columns: repeat(3, 1fr); } }\n@media (max-width: 640px) { .modules { grid-template-columns: 1fr; } }\n.module {\n  background: rgba(255,255,255,0.04);\n  border: 1px solid rgba(255,255,255,0.12);\n  border-radius: var(--radius-card);\n  padding: 24px 20px;\n  transition: all 0.18s;\n}\n.module:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.25); transform: translateY(-2px); }\n.module .module-num {\n  font-size: 11px;\n  font-weight: 600;\n  color: var(--green);\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  margin-bottom: 12px;\n  display: block;\n}\n.module h3 { color: white; font-size: 16px; font-weight: 600; line-height: 1.3; margin-bottom: 8px; }\n.module p { color: rgba(255,255,255,0.6); font-size: 13px; line-height: 1.55; margin: 0; }\n\n/* ----- mission band (image + overlay) ----- */\n.mission {\n  position: relative;\n  padding: 96px 0;\n  color: white;\n  background-color: var(--navy);\n  overflow: hidden;\n}\n.mission-bg {\n  position: absolute; inset: 0;\n  background-image: linear-gradient(rgba(62,140,122,0.55), rgba(47,113,100,0.78)), url(\"bee8493f-228c-45ac-979b-d2fcb35b39e3\");\n  background-size: cover;\n  background-position: center;\n}\n.mission .container { position: relative; z-index: 1; max-width: 880px; }\n.mission h2 { color: white; font-size: clamp(28px, 3.6vw, 42px); }\n.mission p { color: rgba(255,255,255,0.85); font-size: 18px; }\n\n/* ----- talk to us band ----- */\n.cta-band {\n  background: var(--off-white);\n  border-top: 1px solid var(--border);\n  border-bottom: 1px solid var(--border);\n  padding: 60px 0;\n}\n.cta-band .container { display: flex; align-items: center; justify-content: space-between; gap: 32px; flex-wrap: wrap; }\n.cta-band h2 { margin: 0; font-size: 28px; }\n.cta-band p { color: var(--text-muted); margin: 6px 0 0; }\n\n/* ----- footer ----- */\nfooter {\n  background: var(--navy-deep);\n  color: rgba(255,255,255,0.7);\n  padding: 64px 0 32px;\n  font-size: 14px;\n}\n.footer-grid {\n  display: grid;\n  grid-template-columns: 1.6fr 1fr 1fr 1fr;\n  gap: 48px;\n  margin-bottom: 48px;\n}\n@media (max-width: 900px) { .footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; } }\n@media (max-width: 600px) { .footer-grid { grid-template-columns: 1fr; } }\nfooter h5 {\n  color: white;\n  font-size: 12px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  margin: 0 0 16px;\n  font-weight: 600;\n}\nfooter ul { list-style: none; padding: 0; margin: 0; }\nfooter li { margin: 8px 0; }\nfooter a { color: rgba(255,255,255,0.7); }\nfooter a:hover { color: white; text-decoration: none; }\n.footer-brand { max-width: 320px; }\n.footer-brand p { color: rgba(255,255,255,0.6); margin: 12px 0 18px; line-height: 1.6; }\n.footer-iso { display: flex; gap: 10px; margin-top: 18px; }\n.iso-pill {\n  display: inline-flex; align-items: cente lass=\"container hero-inner\">\n    <span class=\"eyebrow\">Risk &amp; Regulatory Advisory · UK Banks<\u002Fspan>\n    <h1>We help UK banks meet prudential rules and make <span class=\"green-accent\">smarter<\u002Fspan> risk decisions.<\u002Fh1>\n    <p class=\"lede\">Independent advisory, regulatory reporting and risk technology — built around the realities of small and medium-sized banks. Practical, evidence-based, and grounded in two decades of supervisory dialogue.<\u002Fp>\n    <div class=\"hero-actions\">\n      <a class=\"btn btn-primary\" href=\"advisory.html\">Explore advisory services<\u002Fa>\n      <a class=\"btn btn-outline\" href=\"contact.html\">Speak with an expert<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ TRUST STRIP ============ -->\n<div class=\"trust\">\n  <div class=\"container\">\n    <div class=\"trust-row\">\n      <div class=\"trust-item\"><span class=\"trust-badge\">P<\u002Fspan> PRA &amp; FCA Skilled Person Panel<\u002Fdiv>\n      <div class=\"trust-item\"><span class=\"trust-badge\">9<\u002Fspan> ISO 9001 Quality<\u002Fdiv>\n      <div class=\"trust-item\"><span class=\"trust-badge\">27<\u002Fspan> ISO 27001 Information Security<\u002Fdiv>\n      <div class=\"trust-item\"><span class=\"trust-badge\">UK<\u002Fspan> UK-Regulated &amp; Independent<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ ADVISORY SERVICES ============ -->\n<section>\n  <div class=\"container\">\n    <div class=\"section-head\">\n      <div>\n        <span class=\"eyebrow\">Advisory &amp; Consultancy<\u002Fspan>\n        <h2>Four practices, one continuous regulatory cycle.<\u002Fh2>\n      <\u002Fdiv>\n      <p>Our specialists work alongside your finance, risk and treasury teams — from authorisation and ICAAP/ILAAP submissions through to recovery, resolution and solvent exit planning.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"grid grid-4\">\n      <a class=\"cat-card\" href=\"advisory/prudential-regulation.html\">\n        <span class=\"cat-num\">01 / Prudential<\u002Fspan>\n        <h3>Prudential Regulation<\u002Fh3>\n        <p class=\"muted\" style=\"font-size:14.5px\">Capital, liquidity and stress testing — the building blocks of supervisory dialogue.<\u002Fp>\n        <ul class=\"cat-list\">\n          <li>Basel 3.1 readiness<\u002Fli>\n          <li>ICAAP<\u002Fli>\n          <li>ILAAP<\u002Fli>\n          <li>Stress testing<\u002Fli>\n        <\u002Ful>\n      <\u002Fa>\n      <a class=\"cat-card\" href=\"advisory/risk-management.html\">\n        <span class=\"cat-num\">02 / Risk<\u002Fspan>\n        <h3>Risk Management<\u002Fh3>\n        <p class=\"muted\" style=\"font-size:14.5px\">Frameworks, appetite and the day-to-day risk operating model that supervisors expect to see.<\u002Fp>\n        <ul class=\"cat-list\">\n          <li>Framework &amp; appetite<\u002Fli>\n          <li>Operational risk<\u002Fli>\n          <li>Credit risk<\u002Fli>\n        <\u002Ful>\n      <\u002Fa>\n      <a class=\"cat-card\" href=\"advisory/regulatory-reporting.html\">\n        <span class=\"cat-num\">03 / Reporting<\u002Fspan>\n        <h3>Regulatory Reporting<\u002Fh3>\n        <p class=\"muted\" style=\"font-size:14.5px\">Right-first-time COREP, FINREP and PRA returns — with assurance you can stand behind.<\u002Fp>\n        <ul class=\"cat-list\">\n          <li>Assurance &amp; review<\u002Fli>\n          <li>Reporting transformation<\u002Fli>\n          <li>Regulatory assumptions<\u002Fli>\n        <\u002Ful>\n      <\u002Fa>\n      <a class=\"cat-card\" href=\"advisory/strategic-advisory.html\">\n        <span class=\"cat-num\">04 / Strategic<\u002Fspan>\n        <h3>Strategic Advisory<\u002Fh3>\n        <p class=\"muted\" style=\"font-size:14.5px\">Recovery, resolution, solvent exit and continuity — the plans every UK bank now needs.<\u002Fp>\n        <ul class=\"cat-list\">\n          <li>Solvent Exit (SEA)<\u002Fli>\n          <li>Recovery Plan<\u002Fli>\n          <li>Resolution Plan<\u002Fli>\n          <li>Business continuity<\u002Fli>\n        <\u002Ful>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ INSIGHTS ============ -->\n<section class=\"section-alt\">\n  <div class=\"container\">\n    <div class=\"section-head\">\n      <div>\n        <span class=\"eyebrow\">Latest insights<\u002Fspan>\n        <h2>Regulatory analysis, written for practitioners.<\u002Fh2>\n      <\u002Fdiv>\n      <a class=\"btn btn-outline\" href=\"insights.html\">All insights<\u002Fa>\n    <\u002Fdiv>\n\n    <div class=\"grid grid-3\">\n      <article class=\"insight-card\">\n        <div class=\"insight-cover\" style=\"background-image:url(&quot;35f49cfe-5d77-49e5-ab80-26c00352e565&quot;)\"><\u002Fdiv>\n        <div class=\"insight-body\">\n          <div class=\"insight-meta\">\n            <time datetime=\"2026-04-22\">22 April 2026<\u002Ftime>\n            <span>·<\u002Fspan>\n            <span class=\"insight-tag\">Basel 3.1<\u002Fspan>\n          <\u002Fdiv>\n          <h3>What the PRA's near-final Basel 3.1 rules mean for smaller banks<\u002Fh3>\n          <p>Our read of the Output Floor transitionals, SME support factor, and the practical capital impact for SMEs and challenger banks.<\u002Fp>\n          <a class=\"btn-link\" href=\"#\">Read more<\u002Fa>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"insight-card\">\n        <div class=\"insight-cover\" style=\"background-image:url(&quot;7c4e106a-40e3-4d40-a272-d0391f6e8382&quot;)\"><\u002Fdiv>\n        <div class=\"insight-body\">\n          <div class=\"insight-meta\">\n            <time datetime=\"2026-04-08\">08 April 2026<\u002Ftime>\n            <span>·<\u002Fspan>\n            <span class=\"insight-tag\">ILAAP<\u002Fspan>\n          <\u002Fdiv>\n          <h3>ILAAP 2026: five themes supervisors are pushing back on<\u002Fh3>\n          <p>Survival horizons, behavioural assumptions, intraday liquidity and contingency funding — what's drawing the most s166 attention.<\u002Fp>\n          <a class=\"btn-link\" href=\"#\">Read more<\u002Fa>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"insight-card\">\n        <div class=\"insight-cover\" style=\"background-image:url(&quot;a0368eca-a8c0-4347-a28a-c73f5e6aecb6&quot;)\"><\u002Fdiv>\n        <div class=\"insight-body\">\n          <div class=\"insight-meta\">\n            <time datetime=\"2026-03-19\">19 March 2026<\u002Ftime>\n            <span>·<\u002Fspan>\n            <span class=\"insight-tag\">Reporting<\u002Fspan>\n          <\u002Fdiv>\n          <h3>From spreadsheet to data warehouse: a pragmatic reporting transformation<\u002Fh3>\n          <p>Why most reporting transformation programmes stall in year two — and the architecture choices that keep them on track.<\u002Fp>\n          <a class=\"btn-link\" href=\"#\">Read more<\u002Fa>\n        <\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ k-alm SUITE ============ -->\n<section class=\"module-section\">\n  <div class=\"container\">\n    <div class=\"section-head\">\n      <div>\n        <span class=\"eyebrow\" style=\"color:var(--green)\">k-alm Suite · RiskTech<\u002Fspan>\n        <h2>Risk technology, designed by practitioners.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"color:rgba(255,255,255,0.72)\">Five integrated modules. One source of truth for liquidity, IRRBB, capital and FTP. Deployed in weeks, not quarters.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"modules\">\n      <div class=\"module\">\n        <span class=\"module-num\">M·01<\u002Fspan>\n        <h3>Liquidity Stress Testing<\u002Fh3>\n        <p>Idiosyncratic, market-wide and combined scenarios with full audit trail.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"module\">\n        <span class=\"module-num\">M·02<\u002Fspan>\n        <h3>IRRBB<\u002Fh3>\n        <p>EVE, NII and supervisory outlier test — aligned to BCBS &amp; SS31/15.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"module\">\n        <span class=\"module-num\">M·03<\u002Fspan>\n        <h3>Liquidity Core<\u002Fh3>\n        <p>LCR, NSFR, cashflow ladders and intraday liquidity monitoring.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"module\">\n        <span class=\"module-num\">M·04<\u002Fspan>\n        <h3>Funds Transfer Pricing<\u002Fh3>\n        <p>Behavioural curves, attribution and pricing support for new lending.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"module\">\n        <span class=\"module-num\">M·05<\u002Fspan>\n        <h3>Capital Stress Testing<\u002Fh3>\n        <p>Multi-period P&amp;L, RWA and capital projection under your own scenarios.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:36px;\">\n      <a class=\"btn btn-outline\" style=\"background:transparent;color:white;border-color:rgba(255,255,255,0.3)\" href=\"risktech.html\">Explore the platform →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ MISSION BAND ============ -->\n<section class=\"mission\">\n  <div class=\"mission-bg\" aria-hidden=\"true\"><\u002Fdiv>\n  <div class=\"container\">\n    <span class=\"eyebrow\" style=\"color:var(--green)\">Our mission<\u002Fspan>\n    <h2>We exist to improve the long-term sustainability of the banks we work with.<\u002Fh2>\n    <p>That means honest advice, rigorous analysis, and the willingness to disagree well — with each other, and occasionally with the regulator. We measure success in the soundness of our clients' balance sheets a decade from now.<\u002Fp>\n    <a class=\"btn btn-primary\" style=\"background:white;color:var(--navy)\" href=\"about.html\">More about Aldgate<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ TALK TO US ============ -->\n<section class=\"cta-band\">\n  <div class=\"container\">\n    <div>\n      <h2>Have a regulatory question?<\u002Fh2>\n      <p>Most engagements start with a 30-minute con
